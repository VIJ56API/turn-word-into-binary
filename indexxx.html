<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Secret Messenger | Hacker Mode</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #151515;
            --neon-green: #00ff00;
            --text-color: #00ff00;
            --border-color: #004400;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container { max-width: 800px; width: 100%; text-align: center; }

        .glitch-title { font-size: 2.5rem; text-shadow: 0 0 10px var(--neon-green); }
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .converter-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #000;
            color: var(--neon-green);
            border: 1px solid var(--border-color);
            padding: 15px;
            font-size: 1.1rem;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .button-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

        .btn-neon {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-neon:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .result-box {
            background: #000;
            padding: 20px;
            border: 1px dashed var(--neon-green);
            min-height: 80px;
            margin-top: 20px;
            word-break: break-all;
            text-align: left;
        }

        .footer { margin-top: 40px; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="glitch-title">Binary Messenger <span class="cursor">_</span></h1>
    
    <div class="converter-card">
        <textarea id="inputArea" placeholder="Enter text to hide or binary to reveal..."></textarea>
        
        <div class="button-group">
            <button onclick="handleToBinary()" class="btn-neon">Text ➔ Binary</button>
            <button onclick="handleToText()" class="btn-neon">Binary ➔ Text</button>
            <button onclick="clearAll()" style="color: #ff4444; border-color: #ff4444;" class="btn-neon">Clear</button>
        </div>

        <div id="outputDisplay" class="result-box">Waiting for input...</div>
        <button onclick="copyResult()" style="margin-top: 10px;" class="btn-neon">Copy Result 📋</button>
    </div>

    <div class="footer">
        <p>Project: Binary Secret Messenger</p>
        <p>Created by Vijender Pradhan | 2026</p>
    </div>
</div>

<script>
    // Logic for Text to Binary
    function handleToBinary() {
        const input = document.getElementById('inputArea').value;
        if (!input) {
            alert("Please enter some text!");
            return;
        }

        const binary = input.split('')
            .map(char => {
                // Get ASCII code and convert to 8-bit binary
                return char.charCodeAt(0).toString(2).padStart(8, '0');
            })
            .join(' ');

        document.getElementById('outputDisplay').innerText = binary;
    }

    // Logic for Binary to Text
    function handleToText() {
        const input = document.getElementById('inputArea').value.trim();
        if (!input) {
            alert("Please paste binary data!");
            return;
        }

        const binArray = input.split(/\s+/);
        let decodedText = "";

        for (let bin of binArray) {
            // Validation for 8-bit format
            if (bin.length !== 8 || !/^[01]+$/.test(bin)) {
                document.getElementById('outputDisplay').innerText = "❌ Invalid binary format. Use 8-bit blocks separated by spaces.";
                return;
            }
            decodedText += String.fromCharCode(parseInt(bin, 2));
        }

        document.getElementById('outputDisplay').innerText = decodedText;
    }

    function clearAll() {
        document.getElementById('inputArea').value = "";
        document.getElementById('outputDisplay').innerText = "Waiting for input...";
    }

    function copyResult() {
        const text = document.getElementById('outputDisplay').innerText;
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard!");
    }
</script>

</body>
</html>
